<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>⚔ BATTLE OF THE HASH — CySA+ CS0-003</title>
  <style>
    :root {
      --bg:         #060e1a;
      --surface:    #0c1d30;
      --surface2:   #102540;
      --border:     #1a3550;
      --border2:    #254a6e;
      --cyan:       #00e5ff;
      --cyan-dim:   #0097a7;
      --green:      #00ff88;
      --green-dim:  #00c46a;
      --red:        #ff4444;
      --red-dim:    #c0392b;
      --yellow:     #ffd700;
      --orange:     #ff8c00;
      --text:       #dde6f0;
      --muted:      #8099b0;
      --dim:        #3d5570;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── LAYOUT ── */
    .wrap  { max-width: 980px; margin: 0 auto; padding: 14px 16px; }
    .row   { display: flex; gap: 14px; }
    .col   { flex: 1 1 0; min-width: 0; }
    .center { text-align: center; }

    /* ── PANELS ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .ptitle {
      color: var(--cyan);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      border-radius: 2px;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: var(--cyan); color: var(--bg); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-red    { border-color: var(--red);    color: var(--red);    }
    .btn-red:hover:not(:disabled)    { background: var(--red);    color: #fff; }
    .btn-green  { border-color: var(--green);  color: var(--green);  }
    .btn-green:hover:not(:disabled)  { background: var(--green);  color: var(--bg); }
    .btn-yellow { border-color: var(--yellow); color: var(--yellow); }
    .btn-yellow:hover:not(:disabled) { background: var(--yellow); color: var(--bg); }
    .btn-orange { border-color: var(--orange); color: var(--orange); }
    .btn-orange:hover:not(:disabled) { background: var(--orange); color: var(--bg); }
    .btn-lg  { padding: 12px 26px; font-size: 13px; }
    .btn-blk { width: 100%; display: block; text-align: center; margin-bottom: 8px; }

    /* ── INPUTS ── */
    input[type="text"], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      border-radius: 2px;
      outline: none;
      margin-bottom: 8px;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--cyan); }
    textarea { resize: vertical; min-height: 64px; }

    /* ── HP BARS ── */
    .hp-section {
      display: grid;
      grid-template-columns: 1fr 48px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .hp-lbl { font-size: 9px; letter-spacing: 2px; margin-bottom: 4px; }
    .hp-lbl.c  { color: var(--green); }
    .hp-lbl.h  { color: var(--red); text-align: right; }
    .hp-track {
      height: 22px;
      background: #06101e;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .hp-fill { height: 100%; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
    .hp-fill.c { background: linear-gradient(90deg, var(--green-dim), var(--green)); }
    .hp-fill.h { background: linear-gradient(90deg, var(--red-dim), var(--red)); float: right; }
    .hp-val {
      position: absolute; top: 50%; transform: translateY(-50%);
      font-size: 11px; font-weight: bold; color: #fff;
      text-shadow: 0 0 6px #000; padding: 0 5px;
    }
    .hp-val.l { left: 0; }
    .hp-val.r { right: 0; }
    .vs-mid { color: var(--yellow); font-size: 17px; font-weight: bold; text-align: center; }

    /* ── ASCII STAGE ── */
    .stage {
      display: grid;
      grid-template-columns: 1fr 42px 1fr;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 14px 12px;
      margin-bottom: 12px;
    }
    .art { white-space: pre; font-size: 10.5px; line-height: 1.35; text-align: center; }
    .art.c { color: var(--green); }
    .art.h { color: var(--red); }
    .stage-vs { color: var(--yellow); font-size: 19px; font-weight: bold; text-align: center; }

    /* ── EVENT BANNER ── */
    .banner {
      text-align: center;
      padding: 9px;
      font-size: 13px;
      font-weight: bold;
      min-height: 40px;
      border-radius: 2px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .banner.hit    { background: rgba(0,255,136,.12); color: var(--green); border: 1px solid var(--green-dim); }
    .banner.dmg    { background: rgba(255,68,68,.12);  color: var(--red);   border: 1px solid var(--red-dim); }
    .banner.idle   { background: rgba(0,229,255,.07);  color: var(--cyan);  border: 1px solid var(--border2); }

    /* ── QUESTION ── */
    .q-meta    { color: var(--muted); font-size: 9px; letter-spacing: 2px; margin-bottom: 4px; }
    .q-num     { color: var(--yellow); font-size: 9px; letter-spacing: 2px; margin-bottom: 3px; }
    .q-text    { font-size: 14px; line-height: 1.65; padding-left: 12px; border-left: 3px solid var(--cyan); margin-bottom: 14px; }
    .q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .q-opt {
      background: var(--bg); border: 1px solid var(--border);
      padding: 10px 11px; font-size: 12px; border-radius: 2px; line-height: 1.4;
    }
    .q-opt .ol { color: var(--cyan); font-weight: bold; margin-right: 6px; }
    .q-opt.ok  { border-color: var(--green); background: rgba(0,255,136,.08); color: var(--green); }
    .q-opt.ok .ol { color: var(--green); }

    /* ── ANSWER BUTTONS (Player) ── */
    .a-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .a-btn {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 14px 12px;
      font-family: 'Courier New', monospace; font-size: 13px;
      text-align: left; cursor: pointer; border-radius: 2px;
      transition: border-color 0.12s; line-height: 1.4;
    }
    .a-btn .al { color: var(--cyan); font-weight: bold; margin-right: 7px; }
    .a-btn:hover:not(:disabled)   { border-color: var(--cyan); }
    .a-btn.sel    { border-color: var(--yellow); background: rgba(255,215,0,.07); color: var(--yellow); }
    .a-btn.sel .al{ color: var(--yellow); }
    .a-btn.ok     { border-color: var(--green); background: rgba(0,255,136,.09); color: var(--green); }
    .a-btn.ok .al { color: var(--green); }
    .a-btn.ng     { border-color: var(--red);   background: rgba(255,68,68,.07);  color: var(--red); }
    .a-btn.ng .al { color: var(--red); }
    .a-btn:disabled { cursor: default; }

    /* ── VOTE GRID ── */
    .v-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
    .v-cell {
      background: var(--bg); border: 1px solid var(--border);
      padding: 9px 6px; text-align: center; border-radius: 2px;
      transition: border-color 0.3s;
    }
    .v-cell.live { border-color: var(--cyan-dim); }
    .v-cell.win  { border-color: var(--green); background: rgba(0,255,136,.07); }
    .v-cell .vl  { font-size: 14px; color: var(--cyan); font-weight: bold; }
    .v-cell .vn  { font-size: 26px; font-weight: bold; color: var(--text); line-height: 1.1; }
    .v-cell .vp  { font-size: 9px; color: var(--muted); margin-top: 3px; }

    /* ── TAUNT BOX ── */
    .taunt {
      background: rgba(255,68,68,.09);
      border: 1px solid rgba(255,68,68,.35);
      padding: 11px 14px; min-height: 50px;
      font-size: 13px; color: var(--red); font-style: italic;
      border-radius: 2px; margin: 10px 0;
    }

    /* ── EXPLAIN BOX ── */
    .explain {
      background: rgba(0,229,255,.06); border: 1px solid var(--cyan-dim);
      padding: 11px 14px; font-size: 12px; color: var(--cyan);
      border-radius: 2px; margin-top: 10px; line-height: 1.6;
    }

    /* ── PROGRESS DOTS ── */
    .dots { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
    .dot  { width: 11px; height: 11px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); }
    .dot.done { background: var(--green); border-color: var(--green); }
    .dot.cur  { background: var(--yellow); border-color: var(--yellow); }

    /* ── PLAYER CHIPS ── */
    .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .chip {
      padding: 3px 8px; font-size: 10px; border-radius: 2px;
      border: 1px solid var(--border); color: var(--muted);
    }
    .chip.in { border-color: var(--green); color: var(--green); background: rgba(0,255,136,.07); }

    /* ── LANDING ── */
    .land {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 20px; text-align: center;
    }
    .title-art { color: var(--cyan); font-size: 10.5px; line-height: 1.3; white-space: pre; margin-bottom: 20px; }
    .role-row  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 520px; margin-top: 14px; }
    .rcard {
      background: var(--surface); border: 1px solid var(--border);
      padding: 20px 12px; cursor: pointer; border-radius: 3px;
      text-decoration: none; color: var(--text); transition: border-color 0.2s, transform 0.2s;
      display: block;
    }
    .rcard:hover { border-color: var(--cyan); transform: translateY(-3px); }
    .rcard .ri  { font-size: 24px; margin-bottom: 9px; }
    .rcard .rn  { color: var(--cyan); font-size: 10px; letter-spacing: 2px; font-weight: bold; }
    .rcard .rs  { color: var(--muted); font-size: 10px; margin-top: 4px; line-height: 1.4; }

    /* ── GAMEOVER ── */
    .go-wrap { text-align: center; padding: 30px 20px; }
    .go-art  { font-size: 11px; line-height: 1.35; display: inline-block; margin-bottom: 18px; white-space: pre; }
    .go-stat {
      display: inline-block; background: var(--surface); border: 1px solid var(--border);
      padding: 12px 22px; border-radius: 2px; text-align: center; margin: 4px;
    }

    /* ── HASHER ACTION GRID ── */
    .act-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 10px 0; }

    /* ── PAGE HEADER ── */
    .page-hdr {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0 12px; margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .page-hdr .ph-title { font-size: 11px; letter-spacing: 3px; }
    .page-hdr .ph-room  { color: var(--muted); font-size: 10px; }
    .page-hdr .ph-room span { color: var(--yellow); }

    /* ── BLINK / PULSE ── */
    @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:.25} }
    @keyframes flashG  { 0%{background:rgba(0,255,136,.25)} 100%{background:transparent} }
    @keytml flashR  { 0%{background:rgba(255,68,68,.25)} 100%{background:transparent} }
    .urgent { animation: blink 0.55s infinite; }

    /* ── JOIN SCREEN ── */
    .join-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 3px; padding: 24px 20px;
      max-width: 360px; width: 100%; margin: 0 auto;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 620px) {
      .a-grid { grid-template-columns: 1fr; }
      .role-row { grid-template-columns: 1fr; }
      .v-grid { grid-template-columns: repeat(2, 1fr); }
      .act-grid { grid-template-columns: 1fr; }
      .hp-section { grid-template-columns: 1fr; }
      .vs-mid { display: none; }
      .stage  { grid-template-columns: 1fr 32px 1fr; }
      .q-options { grid-template-columns: 1fr; }
    }
  </style>
</head>

  const SND = {
    muted: localStorage.getItem('bh_mute') === '1',
    ctx: null,
    get() {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') this.ctx.resume();
      return this.ctx;

    toggle() {

  };

  function _note(c, freq, start, dur, type='sine', vol=0.4) {
    try {
      const osc = c.createOscillator(), g = c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + start);
      g.gain.setValueAtTime(0.001, c.currentTime + start);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
      osc.start(c.currentTime + start);
      osc.stop(c.currentTime + start + dur + 0.05);
    } catch(e) {}
  }

  function _sweep(c, f1, f2, start, dur, type='sawtooth', vol=0.3) {
    try {
      const osc = c.createOscillator(), g = c.createGain();
      osc.connect(g); g.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(f1, c.currentTime + start);
      osc.frequency.exponentialRampToValueAtTime(f2, c.currentTime + start + dur);
      g.gain.setValueAtTime(vol, c.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
      osc.start(c.currentTime + start);
      osc.stop(c.currentTime + start + dur + 0.05);
    } catch(e) {}
  }

  function _noise(c, start, dur, vol=0.18) {
    try {
      const sz = Math.floor(c.sampleRate * dur);
      const buf = c.createBuffer(1, sz, c.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
      const src=c.createBufferSource(), flt=c.createBiquadFilter(), g=c.createGain();
      src.buffer=buf; flt.type='bandpass'; flt.frequency.value=800;
      src.connect(flt); flt.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(vol, c.currentTime+start);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+start+dur);
      src.start(c.currentTime+start);
    } catch(e) {}
  }

      const newStatus  = st.status || 'lobby';
      const newVotes   = Object.values(st.players||{}).filter(p=>p.hasAnswered).length;
      const newTaunt   = st.hasherTaunt || '';
      const newCHP     = st.classHP  ?? 100;
      const newHHP     = st.hasherHP ?? MAX_HHP;
      const newPCount  = Object.keys(st.players||{}).length;

      if (_prevStatus !== newStatus) {
        if (newStatus === 'question')          SFX.question();
        if (newStatus === 'reveal') {
          setTimeout(() => SFX.reveal(), 50);
          setTimeout(() => {
            if (st.revealData?.classWon) SFX.critHit();
            else SFX.counterHash();
            SFX.hpDrain();
          }, 600);
        }
        if (newStatus === 'gameover') {
          setTimeout(() => { if(st.gameResult==='class') SFX.victory(); else SFX.defeat(); }, 300);
        }
      }
      if (newVotes > _prevVotes)              SFX.tick();
      if (newTaunt && newTaunt !== _prevTaunt) SFX.tauntHit();
      if (newPCount > _prevPCount)            SFX.join();

      _prevStatus = newStatus; _prevVotes = newVotes; _prevTaunt = newTaunt;
      _prevCHP = newCHP; _prevHHP = newHHP; _prevPCount = newPCount;
      // ── END SOUND TRIGGERS ──

      if (st.status === 'gameover') { renderGameover(st, 'host'); return; }

  function hostInit() {
    SFX.arenaInit();

      status: 'lobby', currentQuestion: 0,

      lastEvent: '⚔ Arena initialized. Students, join now!',
      gameResult: null, revealData: null

  function hostStart(n) {
    const q = QUESTIONS[n];
    roomRef.update({
      status: 'question', currentQuestion: n,
      questionStartedAt: firebase.database.ServerValue.TIMESTAMP,
      hasherTaunt: '', revealData: null,
      lastEvent: `Q${n+1} ACTIVE: ${q.category} — Awaiting answers!`,
      'currentQ/text': q.text, 'currentQ/A': q.A, 'currentQ/B': q.B,
      'currentQ/C': q.C, 'currentQ/D': q.D, 'currentQ/timeLimit': 30
    });
    // Clear player answers
    roomRef.child('players').once('value', snap => {
      if (!snap.exists()) return;
      const u = {};
      Object.keys(snap.val()).forEach(pid => {
        u[`players/${pid}/answer`] = null;
        u[`players/${pid}/hasAnswered`] = false;
      });
      roomRef.update(u);
    });
  }

  function hostReveal(qIdx) {
    const q      = QUESTIONS[qIdx];
    const isFinal = qIdx === QUESTIONS.length - 1;

    roomRef.once('value', snap => {
      const st     = snap.val() || {};
      const cHP    = st.classHP  ?? 100;
      const hHP    = st.hasherHP ?? 280;
      const V      = {A:0,B:0,C:0,D:0};
      Object.values(st.players||{}).forEach(p => { if(p.answer) V[p.answer]=(V[p.answer]||0)+1; });

      const total      = Object.values(V).reduce((a,b)=>a+b,0);
      const correctVotes = V[q.correct] || 0;
      const correctPct   = total > 0 ? correctVotes / total : 0;
      const wrongPct     = total > 0 ? (total - correctVotes) / total : 0;
      const classHitThreshold = correctPct > 0.60;

      let nCHP=cHP, nHHP=hHP, event, classWon;

      if (isFinal) {
        // ── Q25 KILL SHOT ──
        if (classHitThreshold) {
          nHHP    = 0;
          classWon= true;
          event   = `💥 FINAL HASH! ${Math.round(correctPct*100)}% correct — THE HASHER IS FULLY DRAINED! Class wins!`;
        } else {
          nCHP    = 0;
          classWon= false;
          event   = `💀 FINAL COUNTER HASH! Only ${Math.round(correctPct*100)}% correct — CLASS HP FULLY DRAINED! The Hasher wins!`;
        }
      } else if (total === 0) {
        // No votes submitted
        event    = `⚠ No votes recorded. No damage dealt.`;
        classWon = false;
      } else if (classHitThreshold) {
        // Class broke 60% — Hasher takes scaled damage
        const dmg = Math.max(5, Math.round(correctPct * q.damage));
        nHHP      = Math.max(0, hHP - dmg);
        classWon  = true;
        event     = `💥 CRITICAL HIT! ${Math.round(correctPct*100)}% correct. The Hasher takes ${dmg} HP damage!`;
      } else {
        // Class under 60% — Class takes scaled damage
        const dmg = Math.max(5, Math.round(wrongPct * q.damage));
        nCHP      = Math.max(0, cHP - dmg);
        classWon  = false;
        event     = `💀 COUNTER HASH! Only ${Math.round(correctPct*100)}% correct. Class takes ${dmg} HP damage!`;
      }

      let gameResult = null;
      if (nHHP <= 0) gameResult = 'class';
      else if (nCHP <= 0) gameResult = 'hasher';

      roomRef.update({
        status: gameResult ? 'gameover' : 'reveal',
        classHP: nCHP, hasherHP: nHHP,
        lastEvent: event, gameResult,
        revealData: {
          correct: q.correct, votes: V, classWon,
          explanation: q.explanation,
          correctPct: Math.round(correctPct*100)
        }
      });
    });
  }

  function hostEnd() {
    roomRef.update({ status: 'gameover', gameResult: 'class' });
  }

  async function genTaunt() {
    const ctx  = document.getElementById('tctx')?.value || '';
    const btn  = document.getElementById('ai-btn');
    const out  = document.getElementById('ai-out');
    const fire = document.getElementById('fire-btn');
    const key  = _antKey || sessionStorage.getItem('bh_ant') || '';
    if (!key) {
      if(out){ out.style.display='block'; out.textContent='⚠ Enter your Anthropic API key above first.'; } return;
    }
    if(btn)  { btn.disabled=true; btn.textContent='⚡ GENERATING...'; }
    if(out)  { out.style.display='none'; }
    if(fire) { fire.style.display='none'; }
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 150,
          messages: [{
            role: 'user',
            content: `You are "The Hasher" — the villain final boss in a CySA+ CS0-003 certification review game.
You are a cybersecurity expert who is deeply knowledgeable, intimidating, and sharp-tongued.
Your taunts are professionally appropriate but cutting — they reference real security concepts when possible.
Keep it to 1-2 SHORT sentences. No preamble, no labels, no quotes — just the taunt itself.
Context: ${ctx || 'The class just answered a CySA+ CS0-003 question in the review game.'}`
          }]
        })
      });
      const data  = await resp.json();
      const taunt = data.content?.[0]?.text?.trim() || 'Error parsing response.';
      pendingTaunt = taunt;
      if(out)  { out.style.display='block'; out.textContent='💀 "' + taunt + '"'; }
      if(fire) { fire.style.display='block'; }
    } catch(e) {
      if(out) { out.style.display='block'; out.textContent='API error: ' + e.message; }
    } finally {
      if(btn) { btn.disabled=false; btn.textContent='⚡ GENERATE AI TAUNT'; }
    }
  }

  function startPlayerListen() {
    renderPWait();
    const fn = roomRef.on('value', snap => {
      const st = snap.val();
      if (!st) return;

      // ── PLAYER SOUND TRIGGERS (each student's own device) ──
      const ns = st.status || 'lobby';
      const nt = st.hasherTaunt || '';
      if (_pPrevStatus !== ns) {
        if (ns === 'question') SFX.question();
        if (ns === 'reveal') {
          setTimeout(() => SFX.reveal(), 50);
          setTimeout(() => {
            const me = st.players?.[myId];
            const q  = QUESTIONS[st.currentQuestion||0];
            if (me?.answer === q?.correct) SFX.critHit();
            else SFX.counterHash();
          }, 600);
        }
        if (ns === 'gameover') {
          setTimeout(() => { if(st.gameResult==='class') SFX.victory(); else SFX.defeat(); }, 300);
        }
      }
      if (nt && nt !== _pPrevTaunt) SFX.tauntHit();
      _pPrevStatus = ns; _pPrevTaunt = nt;
      // ── END PLAYER SOUND TRIGGERS ──

      byStatus(st);
    });
    killListeners.push(() => roomRef.off('value', fn));
  }

          <div class="hp-lbl h">HASHER HP ▲</div>
          <div class="hp-track">
            <div class="hp-fill h" style="width:${Math.round(hHP/MAX_HHP*100)}%"></div>
            <div class="hp-val r">${hHP}/${MAX_HHP}</div>
          </div>
        </div>
      </div>

      ${taunt ? `<div class="taunt">💀 THE HASHER: "${taunt}"</div>` : ''}

      <div class="panel">
        <div class="q-num">Q${cq+1} / ${QUESTIONS.length} &nbsp;|&nbsp; ${q.category}</div>
        <div class="q-text">${q.text}</div>
        <div class="a-grid">
          ${['A','B','C','D'].map(l => {
            const sel = locked && myAns===l;
            return `<button class="a-btn ${sel?'sel':''}"
              ${locked ? 'disabled' : `onclick="pAns('${l}')"`}>
              <span class="al">${l}.</span>${q[l]}
            </button>`;
          }).join('')}
        </div>
        ${locked
          ? `<div class="center" style="color:var(--green);font-size:14px;padding:10px;">
               ✓ Locked in: <strong>${myAns}</strong>
               <div style="color:var(--muted);font-size:11px;margin-top:4px;">Waiting for others...</div>
             </div>`
          : `<div class="center" style="color:var(--muted);font-size:12px;padding:8px;">Select your answer</div>`}
      </div>
    </div>`;
  }

  function pAns(letter) {
    SFX.locked();
    roomRef.child('players/' + myId).update({ answer: letter, hasAnswered: true });
  }

  function renderPReveal(st) {
    const cq    = st.currentQuestion || 0;
    const q     = QUESTIONS[cq];
    const cHP   = st.classHP  ?? 100;
    const hHP   = st.hasherHP ?? MAX_HHP;
    const me    = st.players?.[myId] || {};
    const myAns = me.answer || null;
    const ok    = myAns === q.correct;
    const taunt = st.hasherTaunt || '';

    app$().innerHTML = `
    <div class="wrap" style="max-width:640px;">
      <div class="hp-section" style="margin-top:12px;">
        <div>
          <div class="hp-lbl c">▲ COHORT HP</div>
          <div class="hp-track">
            <div class="hp-fill c" style="width:${cHP}%"></div>
            <div class="hp-val l">${cHP}/100</div>
          </div>
        </div>
        <div class="vs-mid">VS</div>
        <div>
          <div class="hp-lbl h">HASHER HP ▲</div>
          <div class="hp-track">
            <div class="hp-fill h" style="width:${Math.round(hHP/MAX_HHP*100)}%"></div>
            <div class="hp-val r">${hHP}/${MAX_HHP}</div>
          </div>
        </div>
      </div>

      ${taunt ? `<div class="taunt">💀 THE HASHER: "${taunt}"</div>` : ''}

      <div class="panel">
        <div class="q-num">Q${cq+1} RESULTS</div>
        <div class="q-text">${q.text}</div>
        <div class="a-grid">
          ${['A','B','C','D'].map(l=>{
            let cls='a-btn';
            if(l===q.correct) cls+=' ok';
            else if(myAns===l) cls+=' ng';
            return `<button class="${cls}" disabled>
              <span class="al">${l}.${l===q.correct?' ✓':myAns===l?' ✗':''}</span>${q[l]}
            </button>`;
          }).join('')}
        </div>
        <div class="center" style="font-size:15px;font-weight:bold;padding:10px;
          color:${!myAns?'var(--muted)':ok?'var(--green)':'var(--red)'};">
          ${!myAns ? '⚠ No answer submitted'
            : ok   ? '✓ You got it!'
            : `✗ Correct answer: ${q.correct}`}
        </div>
        <div class="explain">💡 ${q.explanation}</div>
      </div>

      <div class="center" style="color:var(--dim);font-size:11px;padding:10px;letter-spacing:1px;">
        ⏳ Waiting for host to advance...
      </div>
    </div>`;
  }

  // ════════════════════════════════════════════════════════════════
  //  GAME OVER
  // ════════════════════════════════════════════════════════════════
  function renderGameover(st, view) {
    const won  = st.gameResult === 'class';
    const cHP  = st.classHP  ?? 0;
    const hHP  = st.hasherHP ?? 0;

    const art  = won
      ? `<pre class="go-art art c">${ART.winC}</pre>`
      : `<pre class="go-art art h">${ART.winH}</pre>`;

    const html = `
    <div class="go-wrap">
      ${art}
      <div style="font-size:22px;font-weight:bold;margin:14px 0;
        color:${won?'var(--green)':'var(--red)'};">
        ${won ? '🎓 GRADUATION UNLOCKED — THE HASHER IS HASHED!'
              : '💀 THE HASHER WINS — STUDY HARDER.'}
      </div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:20px;">
        ${won ? 'The cohort collectively defeated the final boss. Well earned.'
              : 'The Hasher remains undefeated. There are no shortcuts in cybersecurity.'}
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;">
        <div class="go-stat">
          <div style="color:var(--green);font-size:9px;letter-spacing:2px;">COHORT HP</div>
          <div style="font-size:28px;font-weight:bold;color:${cHP>0?'var(--green)':'var(--red)'};">${cHP}</div>
        </div>
        <div class="go-stat">
          <div style="color:var(--red);font-size:9px;letter-spacing:2px;">HASHER HP</div>
          <div style="font-size:28px;font-weight:bold;color:${hHP>0?'var(--red)':'var(--muted)'};">${hHP}</div>
        </div>
      </div>
      ${view==='host' ? `<button class="btn btn-yellow btn-lg" onclick="hostInit()">↺ PLAY AGAIN</button>` : ''}
    </div>`;

    if (view === 'host') {
      const hb = document.getElementById('hbody');
      if (hb) { hb.innerHTML = html; return; }
    }
    if (view === 'hasher') {
      const hb = document.getElementById('hsbody');
      if (hb) { hb.innerHTML = html; return; }
    }
    app$().innerHTML = `<div class="wrap">${html}</div>`;
  }

  // ════════════════════════════════════════════════════════════════
  //  UTILITIES
  // ════════════════════════════════════════════════════════════════
  function errBox(msg) {
    return `<div style="color:var(--red);padding:30px;max-width:600px;margin:0 auto;font-size:13px;">
      <div style="font-size:10px;letter-spacing:2px;color:var(--red);margin-bottom:12px;">⚠ ERROR</div>
      ${msg}
    </div>`;
  }

  window.addEventListener('beforeunload', () => {
    killListeners.forEach(f => f());
  });
  </script>
</body>
</html>
